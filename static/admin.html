<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - YAHUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f5ff; --neon2: #ff3cac; --gold: #ffd700; --dark: #05080f; --card: rgba(13,18,32,0.85); --border: rgba(0,245,255,0.15); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--dark); color: #e0e8ff; min-height: 100vh; }
        .bg-grid { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(0,245,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.025) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
        .main { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 32px 20px; }
        .page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
        .page-icon { font-size: 36px; }
        .page-title { font-family: 'Orbitron', monospace; font-size: 24px; font-weight: 700; }
        .page-sub { font-size: 13px; color: rgba(255,255,255,0.3); margin-top: 3px; font-family: 'Inter', sans-serif; }

        /* Tabs */
        .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 28px; }
        .tab-btn {
            padding: 9px 20px; border: 1px solid rgba(0,245,255,0.12); border-radius: 8px;
            background: transparent; color: rgba(255,255,255,0.4); cursor: pointer;
            font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700; letter-spacing: 2px;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--neon); border-color: rgba(0,245,255,0.3); }
        .tab-btn.active { color: var(--dark); background: var(--neon); border-color: var(--neon); box-shadow: 0 0 20px rgba(0,245,255,0.3); }

        /* Tab content */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Stats grid */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
        @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr; } }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px; text-align: center; backdrop-filter: blur(16px); }
        .stat-num { font-family: 'Orbitron', monospace; font-size: 36px; font-weight: 900; line-height: 1; margin-bottom: 8px; }
        .stat-label { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); }

        /* Panel */
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; backdrop-filter: blur(16px); margin-bottom: 20px; }
        .panel-header { padding: 16px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(0,245,255,0.02); }
        .panel-title { font-family: 'Orbitron', monospace; font-size: 12px; letter-spacing: 2px; color: var(--neon); }
        .panel-body { padding: 20px 22px; }

        /* Table rows */
        .row-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .row-item:last-child { border-bottom: none; }
        .row-main { font-size: 15px; font-weight: 600; }
        .row-sub { font-size: 12px; color: rgba(255,255,255,0.3); font-family: 'Inter', sans-serif; margin-top: 2px; }
        .badge-role { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .badge-admin { background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); color: var(--gold); }
        .badge-user { background: rgba(0,245,255,0.08); border: 1px solid rgba(0,245,255,0.15); color: var(--neon); }
        .btn-danger { padding: 6px 14px; border: 1px solid rgba(255,77,109,0.3); border-radius: 6px; background: rgba(255,77,109,0.08); color: #ff6b85; cursor: pointer; font-size: 12px; font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 1px; transition: all 0.2s; }
        .btn-danger:hover { background: rgba(255,77,109,0.2); }
        .you-badge { font-size: 12px; color: rgba(255,255,255,0.2); font-style: italic; }

        /* History grid */
        .hist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
        .hist-card { background: rgba(0,0,0,0.3); border: 1px solid rgba(0,245,255,0.08); border-radius: 12px; overflow: hidden; }
        .hist-card img { width: 100%; display: block; }
        .hist-card-body { padding: 12px; }
        .hist-email { font-size: 13px; font-weight: 700; color: var(--neon); margin-bottom: 4px; }
        .hist-meta { font-size: 12px; color: rgba(255,255,255,0.3); }
        .btn-dl-sm { display: block; margin-top: 10px; text-align: center; padding: 7px; border-radius: 6px; border: 1px solid rgba(0,204,102,0.2); background: rgba(0,204,102,0.08); color: #00cc66; font-size: 11px; font-family: 'Orbitron', monospace; letter-spacing: 1px; text-decoration: none; transition: all 0.2s; }

        /* Fields */
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 7px; }
        .field input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,245,255,0.12); border-radius: 8px; padding: 10px 13px; color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
        .field input:focus { border-color: var(--neon); }
        .field input::placeholder { color: rgba(255,255,255,0.18); }
        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-primary { padding: 11px 24px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700; letter-spacing: 2px; background: linear-gradient(135deg, var(--neon), #007acc); color: var(--dark); transition: all 0.2s; }
        .btn-primary:hover { box-shadow: 0 0 30px rgba(0,245,255,0.3); }
        .btn-secondary { padding: 11px 24px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600; background: transparent; color: rgba(255,255,255,0.4); transition: all 0.2s; }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .btn-success { padding: 11px 24px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700; letter-spacing: 2px; background: linear-gradient(135deg, #00cc66, #008844); color: #fff; text-decoration: none; display: inline-block; transition: all 0.2s; text-align: center; }
        .msg-ok { color: #00cc66; font-size: 13px; margin-top: 10px; display: none; }
        .msg-err { color: #ff6b85; font-size: 13px; margin-top: 10px; display: none; }
        .search-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(0,245,255,0.12); border-radius: 8px; padding: 9px 13px; color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; min-width: 240px; }
        .search-input:focus { border-color: var(--neon); }
        .file-label { display: flex; align-items: center; gap: 10px; padding: 10px 13px; background: rgba(0,0,0,0.5); border: 1px dashed rgba(0,245,255,0.2); border-radius: 8px; cursor: pointer; font-size: 14px; color: rgba(255,255,255,0.35); transition: all 0.2s; }
        .file-label:hover { border-color: var(--neon); color: var(--neon); }
        input[type="file"] { display: none; }
        .empty-text { color: rgba(255,255,255,0.2); font-family: 'Orbitron', monospace; font-size: 12px; letter-spacing: 2px; text-align: center; padding: 40px 0; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div id="navbar"></div>
    <div class="main">
        <div class="page-header">
            <div class="page-icon">⚙️</div>
            <div>
                <div class="page-title">TRANG QUẢN TRỊ</div>
                <div class="page-sub">Quản lý hệ thống YAHUB</div>
            </div>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('stats',this)">📊 THỐNG KÊ</button>
            <button class="tab-btn" onclick="showTab('users',this)">👤 USERS</button>
            <button class="tab-btn" onclick="showTab('history',this)">📋 LỊCH SỬ</button>
            <button class="tab-btn" onclick="showTab('notification',this)">🔔 THÔNG BÁO</button>
        </div>

        <!-- Stats -->
        <div id="tab-stats" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-num" id="totalUsers" style="color:var(--neon)">—</div>
                    <div class="stat-label">Tổng Users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="totalBxh" style="color:#00cc66">—</div>
                    <div class="stat-label">Bảng đã tạo</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="mostUsedBg" style="color:var(--gold);font-size:20px;padding-top:8px">—</div>
                    <div class="stat-label">BG phổ biến nhất</div>
                </div>
            </div>
        </div>

        <!-- Users -->
        <div id="tab-users" class="tab-content">
            <div class="panel">
                <div class="panel-header"><span class="panel-title">DANH SÁCH NGƯỜI DÙNG</span></div>
                <div class="panel-body" id="usersList"><div class="empty-text">ĐANG TẢI...</div></div>
            </div>
        </div>

        <!-- History -->
        <div id="tab-history" class="tab-content">
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">LỊCH SỬ TẤT CẢ</span>
                    <input class="search-input" type="text" id="historySearch" placeholder="Tìm theo email..." oninput="filterHistory()">
                </div>
                <div class="panel-body"><div class="hist-grid" id="adminHistoryList"><div class="empty-text">ĐANG TẢI...</div></div></div>
            </div>
        </div>

        <!-- Notification -->
        <div id="tab-notification" class="tab-content">
            <div class="panel">
                <div class="panel-header"><span class="panel-title">CÀI ĐẶT THÔNG BÁO</span></div>
                <div class="panel-body">
                    <div class="field"><label>Nội dung thông báo</label><input type="text" id="notifMessage" placeholder="Nhập nội dung hiển thị cho toàn bộ users..."></div>
                    <div class="field"><label>Thời gian hiển thị (giây)</label><input type="number" id="notifDuration" value="5" min="1" style="max-width:160px"></div>
                    <div class="btn-row">
                        <button class="btn-primary" onclick="setNotification(true)">🔔 BẬT THÔNG BÁO</button>
                        <button class="btn-secondary" onclick="setNotification(false)">Tắt thông báo</button>
                    </div>
                    <div class="msg-ok" id="notifMsg"></div>
                </div>
            </div>
        </div>


    </div>

    <script src="/static/auth.js"></script>
    <script>
        requireAuth();
        document.getElementById("navbar").innerHTML = renderNavbar("/admin");
        const user = getUser();
        if (!user || user.role !== "admin") window.location.href = "/dashboard";

        let allHistory = [];

        function showTab(tab, btn) {
            document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
            document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));
            document.getElementById(`tab-${tab}`).classList.add("active");
            btn.classList.add("active");
            if (tab === "stats") loadStats();
            if (tab === "users") loadUsers();
            if (tab === "history") loadAdminHistory();
        }

        async function loadStats() {
            const res = await fetch("/api/admin/stats", {headers: authHeaders()});
            const data = await res.json();
            document.getElementById("totalUsers").textContent = data.total_users;
            document.getElementById("totalBxh").textContent = data.total_bxh;
            document.getElementById("mostUsedBg").textContent = data.most_used_bg;
        }

        async function loadUsers() {
            const res = await fetch("/api/admin/users", {headers: authHeaders()});
            const data = await res.json();
            const container = document.getElementById("usersList");
            if (!data.users.length) { container.innerHTML = "<div class='empty-text'>CHƯA CÓ USER NÀO</div>"; return; }
            container.innerHTML = data.users.map(u => `
                <div class="row-item">
                    <div>
                        <div class="row-main">${u.email}</div>
                        <div class="row-sub">${new Date(u.created_at).toLocaleDateString("vi-VN")}</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:10px">
                        <span class="badge-role ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">${u.role}</span>
                        ${u.id !== getUser().id ? `<button class="btn-danger" onclick="deleteUser('${u.id}','${u.email}')">Xóa</button>` : '<span class="you-badge">Bạn</span>'}
                    </div>
                </div>
            `).join("");
        }

        async function deleteUser(id, email) {
            if (!confirm(`Xóa tài khoản "${email}"?`)) return;
            const res = await fetch(`/api/admin/users/${id}`, {method: "DELETE", headers: authHeaders()});
            if (res.ok) loadUsers();
        }

        async function loadAdminHistory() {
            const res = await fetch("/api/admin/history", {headers: authHeaders()});
            const data = await res.json();
            allHistory = data.history || [];
            renderHistory(allHistory);
        }

        function renderHistory(list) {
            const container = document.getElementById("adminHistoryList");
            if (!list.length) { container.innerHTML = "<div class='empty-text'>CHƯA CÓ LỊCH SỬ NÀO</div>"; return; }
            container.innerHTML = list.map(h => `
                <div class="hist-card">
                    <img src="${h.image_url}" alt="BXH">
                    <div class="hist-card-body">
                        <div class="hist-email">${h.user_email || "N/A"}</div>
                        <div class="hist-meta">${h.start_time} — ${h.background}</div>
                        <div class="hist-meta">${new Date(h.created_at).toLocaleString("vi-VN")}</div>
                        <a href="${h.image_url}" download class="btn-dl-sm">⬇ TẢI XUỐNG</a>
                    </div>
                </div>
            `).join("");
        }

        function filterHistory() {
            const q = document.getElementById("historySearch").value.toLowerCase();
            renderHistory(allHistory.filter(h => (h.user_email || "").toLowerCase().includes(q)));
        }

        async function setNotification(active) {
            const message = document.getElementById("notifMessage").value;
            const duration = parseInt(document.getElementById("notifDuration").value) || 5;
            const msgDiv = document.getElementById("notifMsg");
            await fetch("/api/admin/notification", { method: "POST", headers: authHeaders(), body: JSON.stringify({active, message, duration}) });
            msgDiv.textContent = active ? "✓ Đã bật thông báo!" : "✓ Đã tắt thông báo!";
            msgDiv.style.display = "block";
        }

        loadStats();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - YAHUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f5ff; --neon2: #ff3cac; --dark: #05080f; --border: rgba(0,245,255,0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--dark); color: #e0e8ff; min-height: 100vh; }
        .bg-grid { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px); background-size: 60px 60px; }
        .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.12; z-index: 0; }
        .orb1 { width: 500px; height: 500px; background: var(--neon2); top: -100px; left: -100px; }
        .orb2 { width: 400px; height: 400px; background: var(--neon); bottom: -100px; right: -100px; }
        .page { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: rgba(13,18,32,0.9); border: 1px solid var(--border); backdrop-filter: blur(24px); border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 440px; box-shadow: 0 0 80px rgba(0,245,255,0.06); }
        .back-link { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.3); font-size: 13px; letter-spacing: 1px; text-decoration: none; margin-bottom: 36px; transition: color 0.2s; }
        .back-link:hover { color: var(--neon); }
        .card-header { text-align: center; margin-bottom: 40px; }
        .card-icon { font-size: 40px; margin-bottom: 12px; }
        .card-title { font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 2px; }
        .card-sub { font-size: 14px; color: rgba(255,255,255,0.35); margin-top: 6px; font-family: 'Inter', sans-serif; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--neon); margin-bottom: 8px; font-weight: 600; }
        .field input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(0,245,255,0.15); border-radius: 8px; padding: 12px 16px; color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 16px; outline: none; transition: border-color 0.3s, box-shadow 0.3s; }
        .field input:focus { border-color: var(--neon); box-shadow: 0 0 20px rgba(0,245,255,0.1); }
        .field input::placeholder { color: rgba(255,255,255,0.2); }
        .msg { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; display: none; }
        .msg-error { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); color: #ff6b85; }
        .msg-success { background: rgba(0,245,255,0.08); border: 1px solid rgba(0,245,255,0.25); color: var(--neon); }
        .btn-submit { width: 100%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; transition: all 0.3s; margin-top: 8px; background: linear-gradient(135deg, var(--neon2), #aa0066); color: #fff; box-shadow: 0 0 30px rgba(255,60,172,0.25); }
        .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 0 50px rgba(255,60,172,0.4); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-link { text-align: center; font-size: 14px; color: rgba(255,255,255,0.35); margin-top: 24px; }
        .login-link a { color: var(--neon); text-decoration: none; font-weight: 600; }
        .login-link a:hover { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="page">
        <div class="card">
            <a href="/" class="back-link">← YAHUB</a>
            <div class="card-header">
                <div class="card-icon">🚀</div>
                <div class="card-title">ĐĂNG KÝ</div>
                <div class="card-sub">Tạo tài khoản YAHUB của bạn</div>
            </div>
            <div id="error" class="msg msg-error"></div>
            <div id="success" class="msg msg-success"></div>
            <div class="field"><label>Email</label><input type="email" id="email" placeholder="your@email.com" required></div>
            <div class="field"><label>Mật khẩu</label><input type="password" id="password" placeholder="Tối thiểu 6 ký tự" required minlength="6"></div>
            <div class="field"><label>Xác nhận mật khẩu</label><input type="password" id="confirm" placeholder="••••••••" required></div>
            <button class="btn-submit" id="submitBtn" onclick="doRegister()">TẠO TÀI KHOẢN</button>
            <div class="login-link">Đã có tài khoản? <a href="/login">Đăng nhập</a></div>
        </div>
    </div>
    <script>
        if (localStorage.getItem("token")) window.location.href = "/dashboard";
        async function doRegister() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirm").value;
            const err = document.getElementById("error"); const suc = document.getElementById("success");
            const btn = document.getElementById("submitBtn");
            err.style.display = "none"; suc.style.display = "none";
            if (password !== confirm) { err.textContent = "Mật khẩu xác nhận không khớp"; err.style.display = "block"; return; }
            btn.disabled = true; btn.textContent = "ĐANG XỬ LÝ...";
            try {
                const res = await fetch("/api/register", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({email, password}) });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail);
                suc.textContent = "Đăng ký thành công! Đang chuyển hướng..."; suc.style.display = "block";
                setTimeout(() => window.location.href = "/login", 1500);
            } catch (e) { err.textContent = e.message; err.style.display = "block"; btn.disabled = false; btn.textContent = "TẠO TÀI KHOẢN"; }
        }
    </script>
</body>
</html>
